<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login Form Component</title>
    <link
      rel="stylesheet"
      href="<https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    >
    <style>
      .error {
        color: red;
        font-size: 0.85rem;
        display: none;
      }
      .success-msg {
        color: green;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="component-root" class="container p-4">
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" class="form-control" id="email" placeholder="Enter email" required />
          <span class="error" id="emailError">Email is required</span>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Password"
            required
          />
          <span class="error" id="passwordError">Password is required</span>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Login</button>
      </form>
      <div class="success-msg mt-3" id="successMsg">Login successful!</div>
    </div>
    <script>
      document.getElementById("loginForm").addEventListener("submit", function (e) {
        e.preventDefault();
        let valid = true;

        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const emailError = document.getElementById("emailError");
        const passwordError = document.getElementById("passwordError");
        const successMsg = document.getElementById("successMsg");

        emailError.style.display = "none";
        passwordError.style.display = "none";
        successMsg.style.display = "none";

        if (!email.value.trim()) {
          emailError.style.display = "block";
          valid = false;
        }
        if (!password.value.trim()) {
          passwordError.style.display = "block";
          valid = false;
        }
        if (valid) {
          successMsg.style.display = "block";
        }
      });
    </script>
  </body>
</html>

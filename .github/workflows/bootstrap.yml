name: Bootstrap Dashboard Infrastructure

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create dashboard-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin dashboard-data; then
            echo "✅ dashboard-data branch already exists. Skipping."
          else
            git checkout --orphan dashboard-data
            git rm -rf . --quiet
            echo '{"lastUpdated":"","entries":[]}' > dashboard-history.json
            echo '{"generatedAt":"","suites":{},"allTests":[],"totalCount":0}' > test-catalog.json
            echo '{}' > dashboard.json
            git add dashboard-history.json test-catalog.json dashboard.json
            git commit -m "chore: initialise dashboard-data branch [bootstrap]"
            git push origin dashboard-data
            git checkout main
            echo "✅ dashboard-data branch created."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure gh-pages branch exists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "✅ gh-pages branch already exists. Skipping."
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet || true
            echo '<!doctype html><meta charset="utf-8"><title>Dashboard</title><p>GitHub Pages placeholder.</p>' > index.html
            git add index.html
            git commit -m "chore: initialise gh-pages branch [bootstrap]"
            git push origin gh-pages
            git checkout main
            echo "✅ gh-pages branch created."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Actions workflow permissions
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/permissions/workflow" \
            -d '{"default_workflow_permissions":"write","can_approve_pull_request_reviews":false}')
          if [ "$RESPONSE" = "204" ]; then
            echo "✅ Actions permissions set to read/write."
          else
            echo "::warning title=Bootstrap Warning::Could not set Actions permissions (HTTP $RESPONSE). Manual: Repo → Settings → Actions → General → Workflow permissions → Read and write"
          fi

      - name: Enable GitHub Pages
        run: |
          STATUS=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" | tail -1)

          if [ "$STATUS" = "200" ]; then
            echo "✅ GitHub Pages already enabled."
          else
            RESPONSE=$(curl -s -o /tmp/pages_response.json -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d '{"source":{"branch":"gh-pages","path":"/"}}')
            if [ "$RESPONSE" = "201" ] || [ "$RESPONSE" = "409" ]; then
              echo "✅ GitHub Pages enabled."
            else
              echo "::warning title=Bootstrap Warning::Could not enable GitHub Pages (HTTP $RESPONSE). Manual: Repo → Settings → Pages → Source: Deploy from branch → gh-pages / root"
              cat /tmp/pages_response.json || true
            fi
          fi

      - name: Bootstrap summary
        run: |
          REPO="${{ github.repository }}"
          ORG=$(echo $REPO | cut -d'/' -f1)
          REPO_NAME=$(echo $REPO | cut -d'/' -f2)
          echo "::notice title=Bootstrap Complete::Push a commit to main to trigger Playwright Tests. Dashboard URL (after first deploy): https://${ORG}.github.io/${REPO_NAME}/"
